networks:
  microservices-net:
    driver: bridge

services:
  # ==========================================
  # API GATEWAY
  # ==========================================
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - payment-service
      - notification-service
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  # ==========================================
  # MICROSERVICES
  # ==========================================
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  catalog-service:
    build: ./catalog-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-catalog:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  payment-service:
    build: ./payment-service
    ports:
      - "8084:8084"
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  notification-service:
    build: ./notification-service
    ports:
      - "8085:8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xss256k"
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 96m

  # ==========================================
  # DATABASES
  # ==========================================
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    command: postgres -c shared_buffers=16MB -c max_connections=20 -c effective_cache_size=32MB
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - microservices-net
    command: postgres -c shared_buffers=16MB -c max_connections=20 -c effective_cache_size=32MB
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - microservices-net
    command: postgres -c shared_buffers=16MB -c max_connections=20 -c effective_cache_size=32MB
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    networks:
      - microservices-net
    command: postgres -c shared_buffers=16MB -c max_connections=20 -c effective_cache_size=32MB
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MESSAGE BROKER
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5