name: CI Pipeline

on:
  push:
    branches: [main]

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────
  # 1. TESTES — todos os serviços em paralelo
  # ─────────────────────────────────────────
  test-api-gateway:
    name: "Testes · api-gateway"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: api-gateway

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-api-gateway
          path: api-gateway/target/surefire-reports/

  test-auth-service:
    name: "Testes · auth-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: auth-service

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-auth-service
          path: auth-service/target/surefire-reports/

  test-catalog-service:
    name: "Testes · catalog-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: catalog-service

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-catalog-service
          path: catalog-service/target/surefire-reports/

  test-order-service:
    name: "Testes · order-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: order-service

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-order-service
          path: order-service/target/surefire-reports/

  test-payment-service:
    name: "Testes · payment-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: payment-service

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-payment-service
          path: payment-service/target/surefire-reports/

  test-notification-service:
    name: "Testes · notification-service"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test --no-transfer-progress
        working-directory: notification-service

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-notification-service
          path: notification-service/target/surefire-reports/

  # ──────────────────────────────────────────────────────────────────────
  # 2. BUILD DAS IMAGENS DOCKER — só roda após TODOS os testes passarem
  # ──────────────────────────────────────────────────────────────────────
  build-images:
    name: "Build Docker · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs:
      - test-api-gateway
      - test-auth-service
      - test-catalog-service
      - test-order-service
      - test-payment-service
      - test-notification-service

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - order-service
          - payment-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build do JAR (sem testes — já rodaram)
        run: mvn package -DskipTests --no-transfer-progress
        working-directory: ${{ matrix.service }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Para fazer push, descomente o bloco abaixo e configure o secret
      # GHCR_TOKEN em Settings → Secrets → Actions:
      #
      # - name: Login no GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ env.REGISTRY }}
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GHCR_TOKEN }}

      - name: Calcular owner em minúsculo
        id: owner
        run: echo "lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false # mude para true ao habilitar o login acima
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # 3. FRONTEND — type-check e build em paralelo com o resto
  # ────────────────────────────────────────────────────────────
  frontend:
    name: "CI · frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install
        working-directory: frontend

      - name: Type-check (tsc)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build de produção
        run: npm run build
        working-directory: frontend

      - name: Publicar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # 4. GATE — garante que toda a matrix build-images passou antes de
  #    prosseguir. Necessário porque needs: [build-images] com matrix
  #    e fail-fast: false pode pular o próximo job silenciosamente.
  # ──────────────────────────────────────────────────────────────────────
  all-builds-ok:
    name: "Gate · todos os builds passaram"
    runs-on: ubuntu-latest
    if: always()
    needs: [build-images, frontend]
    steps:
      - name: Verificar resultado dos builds
        run: |
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "❌ build-images falhou ou foi pulado: ${{ needs.build-images.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "❌ frontend falhou ou foi pulado: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "✅ Todos os builds passaram — prosseguindo para o smoke test"

  # ──────────────────────────────────────────────────────────────────────
  # 5. SMOKE TEST — sobe o Docker Compose e verifica /actuator/health
  #    de todos os serviços. Pipeline só aprovado se todos estiverem UP.
  # ──────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test · /actuator/health"
    runs-on: ubuntu-latest
    needs: [all-builds-ok]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Builda todos os JARs para o docker compose up --build funcionar
      - name: Build de todos os JARs
        run: |
          for svc in api-gateway auth-service catalog-service order-service payment-service notification-service; do
            echo "▶ Building $svc..."
            mvn package -DskipTests --no-transfer-progress -f $svc/pom.xml
          done

      - name: Subir ambiente completo
        run: docker compose up --build -d

      # Aguarda Postgres, RabbitMQ e todos os serviços iniciarem
      - name: Aguardar inicialização (90s)
        run: sleep 90

      - name: Verificar health de todos os serviços
        run: |
          set -e

          check_health() {
            local name=$1
            local port=$2
            local url="http://localhost:${port}/actuator/health"
            local max_attempts=10
            local attempt=1

            echo "──────────────────────────────────────"
            echo "🔍 Checando $name → $url"

            while [ $attempt -le $max_attempts ]; do
              http_code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")

              if [ "$http_code" = "200" ]; then
                status=$(curl -s "$url" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))")
                if [ "$status" = "UP" ]; then
                  echo "✅ $name — UP"
                  return 0
                else
                  echo "⚠️  $name respondeu mas status=$status (tentativa $attempt/$max_attempts)"
                fi
              else
                echo "⏳ $name ainda não responde — HTTP $http_code (tentativa $attempt/$max_attempts)"
              fi

              attempt=$((attempt + 1))
              sleep 10
            done

            echo "❌ $name não ficou healthy após $max_attempts tentativas"
            return 1
          }

          check_health "api-gateway"          8080
          check_health "auth-service"         8081
          check_health "catalog-service"      8082
          check_health "order-service"        8083
          check_health "payment-service"      8084
          check_health "notification-service" 8085

          echo ""
          echo "🎉 Todos os serviços estão healthy!"

      # Imprime os logs de todos os containers se algo falhar
      - name: Exibir logs em caso de falha
        if: failure()
        run: docker compose logs --tail=150

      - name: Derrubar ambiente
        if: always()
        run: docker compose down -v
